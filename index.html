document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,.4);--onacc:#0e1214;--acc:color-mix(in oklab,var(--accbase) 65%,#ffffff);--accink:color-mix(in oklab,var(--accbase) 40%,#ffffff);--accsoft:color-mix(in oklab,var(--accbase) 22%,#1a2027);--hero1:color-mix(in oklab,var(--accbase) 12%,#1a2027);--hero2:color-mix(in oklab,var(--accbase) 5%,#1a2027);--herob:color-mix(in oklab,var(--accbase) 35%,#1a2027);--best:color-mix(in oklab,var(--accbase) 16%,#1a2027)}\n@media (prefers-color-scheme: dark){:root:not([data-theme=\"light\"]){--bg:#12161b;--card:#1a2027;--ink:#e7e5df;--muted:#9aa3ad;--faint:#6d7681;--line:#2a323b;--track:#323b45;--field:#222a33;--fline:#3b4550;--zebra:rgba(255,255,255,.035);--seg:#232b34;--shadow:0 1px 3px rgba(0,0,0,.4);--onacc:#0e1214;--acc:color-mix(in oklab,var(--accbase) 65%,#ffffff);--accink:color-mix(in oklab,var(--accbase) 40%,#ffffff);--accsoft:color-mix(in oklab,var(--accbase) 22%,#1a2027);--hero1:color-mix(in oklab,var(--accbase) 12%,#1a2027);--hero2:color-mix(in oklab,var(--accbase) 5%,#1a2027);--herob:color-mix(in oklab,var(--accbase) 35%,#1a2027);--best:color-mix(in oklab,var(--accbase) 16%,#1a2027)}}\nhtml{background:#eceae4}\nhtml[data-theme=\"dark\"]{background:#12161b}\n@media (prefers-color-scheme: dark){html:not([data-theme=\"light\"]){background:#12161b}}\nbody{margin:0;background:var(--bg);font-variant-numeric:tabular-nums}\na{color:var(--acc)}a:hover{opacity:.8}\ninput[type=\"range\"]{accent-color:var(--acc);width:100%;margin:0;height:22px}\ninput::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}\ninput[type=\"number\"]{-moz-appearance:textfield}\n@media (max-width:680px){.om-two-col{grid-template-columns:1fr !important}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; padding:clamp(10px,3vw,36px); font-family:'IBM Plex Sans',sans-serif; color:var(--ink); background:var(--bg); box-sizing:border-box\">\n<div style=\"max-width:880px; margin:0 auto; background:var(--card); border-radius:16px; padding:clamp(20px,4.5vw,44px); box-shadow:var(--shadow); box-sizing:border-box\">\n\n  <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; margin-bottom:26px\">\n    <div>\n      <div style=\"font-size:22px; font-weight:700; letter-spacing:-0.01em\">Loan Scenario Calculator<\u002Fdiv>\n      <div style=\"font-size:13px; color:var(--muted); margin-top:4px\">Solve for any variable. Pin scenarios to compare.<\u002Fdiv>\n    <\u002Fdiv>\n    <button sc-camel-on-click=\"{{ onCopy }}\" style=\"font:500 13px 'IBM Plex Sans'; color:var(--acc); background:none; border:1px solid var(--acc); border-radius:8px; padding:8px 14px; cursor:pointer\" style-hover=\"background:var(--accsoft)\">{{ copyLabel }}<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap\">\n    <span style=\"font-size:13px; font-weight:600; color:var(--muted)\">Calculate<\u002Fspan>\n    <div style=\"display:flex; background:var(--seg); border-radius:10px; padding:3px; gap:2px; flex-wrap:wrap\">\n      <sc-for list=\"{{ segs }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <button sc-camel-on-click=\"{{ m.onClick }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:linear-gradient(135deg,var(--hero1),var(--hero2)); border:1px solid var(--herob); border-radius:14px; padding:24px 28px; margin-bottom:26px\">\n    <div style=\"font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--acc)\">{{ heroLabel }} — computed<\u002Fdiv>\n    <sc-if value=\"{{ heroError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-size:20px; font-weight:600; color:var(--ink); margin-top:10px; line-height:1.5\">{{ heroError }}<\u002Fdiv>\n      <div style=\"font-size:13px; color:var(--muted); margin-top:4px\">Raise the EMI or shorten the tenure to find a valid scenario.<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ heroOk }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font-size:clamp(34px,7vw,52px); font-weight:700; letter-spacing:-0.02em; color:var(--accink); margin:4px 0 6px; transition:opacity .2s\">{{ heroValue }}<span style=\"font-size:0.45em; font-weight:600; color:var(--muted); margin-left:8px\">{{ heroUnit }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:14px; flex-wrap:wrap\">\n        <div style=\"display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--acc); background:var(--accsoft); border-radius:999px; padding:4px 12px\">{{ deltaText }}<\u002Fdiv>\n        <button sc-camel-on-click=\"{{ onSetBaseline }}\" style=\"background:none; border:none; padding:0; font:600 12px 'IBM Plex Sans'; color:var(--acc); cursor:pointer; text-decoration:underline; text-underline-offset:3px; opacity:.85\">Set as baseline<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:12px 32px; margin-top:16px; font-size:13px; color:var(--muted); flex-wrap:wrap\">\n        <div>Total interest <span style=\"font-weight:600; color:var(--ink)\">{{ totInterest }}<\u002Fspan><\u002Fdiv>\n        <div>Total paid <span style=\"font-weight:600; color:var(--ink)\">{{ totPaid }}<\u002Fspan><span style=\"color:var(--faint)\"> incl. one-time costs<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ payoffNote }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:12.5px; color:var(--faint); margin-top:8px\">{{ payoffNote }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; flex-direction:column; gap:20px; margin-bottom:8px\">\n    <sc-for list=\"{{ fields }}\" as=\"f\" hint-placeholder-count=\"3\">\n      <div>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; font-size:13px; margin-bottom:8px\">\n          <span style=\"display:inline-flex; align-items:center; gap:10px\">\n            <span style=\"font-weight:600\">{{ f.label }}<\u002Fspan>\n            <sc-if value=\"{{ f.isTen }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"display:inline-flex; background:var(--seg); border-radius:6px; padding:2px; gap:1px\">\n                <button sc-camel-on-click=\"{{ f.setYr }}\" style=\"{{ f.yrStyle }}\">yr<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ f.setMo }}\" style=\"{{ f.moStyle }}\">mo<\u002Fbutton>\n              <\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fspan>\n          <input type=\"number\" value=\"{{ f.textVal }}\" min=\"{{ f.min }}\" max=\"{{ f.max }}\" step=\"{{ f.step }}\" sc-camel-on-change=\"{{ f.onText }}\" sc-camel-on-focus=\"{{ f.onFocus }}\" sc-camel-on-blur=\"{{ f.onBlur }}\" style=\"width:110px; text-align:right; border:1px solid var(--fline); border-radius:8px; padding:6px 10px; font:600 13px 'IBM Plex Sans'; background:var(--field); color:var(--ink); font-variant-numeric:tabular-nums\">\n        <\u002Fdiv>\n        <input type=\"range\" value=\"{{ f.val }}\" min=\"{{ f.min }}\" max=\"{{ f.max }}\" step=\"{{ f.step }}\" sc-camel-on-change=\"{{ f.onNum }}\">\n        <sc-if value=\"{{ f.hint }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12px; color:var(--faint); margin-top:4px\">For balance transfers, enter your outstanding principal and remaining tenure.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div class=\"om-two-col\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px 32px; padding-bottom:4px\">\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; font-size:13px\">\n        <span style=\"font-weight:600\">One-time costs <span style=\"color:var(--faint); font-weight:500\">(fees, charges etc.)<\u002Fspan><\u002Fspan>\n        <input type=\"number\" value=\"{{ feesVal }}\" min=\"0\" step=\"1000\" sc-camel-on-change=\"{{ onFees }}\" sc-camel-on-focus=\"{{ onSelAll }}\" style=\"width:110px; text-align:right; border:1px solid var(--fline); border-radius:8px; padding:6px 10px; font:600 13px 'IBM Plex Sans'; background:var(--field); color:var(--ink); font-variant-numeric:tabular-nums; flex-shrink:0\">\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; font-size:13px\">\n        <span style=\"font-weight:600\">Additional yearly prepayment <span style=\"color:var(--faint); font-weight:500\">(optional)<\u002Fspan><\u002Fspan>\n        <input type=\"number\" value=\"{{ prepVal }}\" min=\"0\" step=\"10000\" sc-camel-on-change=\"{{ onPrep }}\" sc-camel-on-focus=\"{{ onSelAll }}\" style=\"width:110px; text-align:right; border:1px solid var(--fline); border-radius:8px; padding:6px 10px; font:600 13px 'IBM Plex Sans'; background:var(--field); color:var(--ink); font-variant-numeric:tabular-nums; flex-shrink:0\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"border-top:1px solid var(--line); padding-top:22px; margin-top:18px; margin-bottom:28px\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap\">\n      <div style=\"font-size:14px; font-weight:600\">{{ chartTitle }}<\u002Fdiv>\n      <div style=\"display:flex; background:var(--seg); border-radius:8px; padding:2px; font-size:12px\">\n        <button sc-camel-on-click=\"{{ onBal }}\" style=\"{{ balStyle }}\">Balance<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ onInt }}\" style=\"{{ intStyle }}\">Cumulative interest<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <svg sc-camel-view-box=\"0 0 800 238\" style=\"width:100%; display:block\">\n      <sc-for list=\"{{ yTicks }}\" as=\"t\" hint-placeholder-count=\"2\">\n        <line x1=\"48\" y1=\"{{ t.y }}\" x2=\"792\" y2=\"{{ t.y }}\" stroke=\"var(--line)\" opacity=\"{{ t.op }}\"><\u002Fline>\n      <\u002Fsc-for>\n      <sc-for list=\"{{ xTicks }}\" as=\"t\" hint-placeholder-count=\"2\">\n        <line x1=\"{{ t.x }}\" y1=\"200\" x2=\"{{ t.x }}\" y2=\"205\" stroke=\"var(--line)\"><\u002Fline>\n      <\u002Fsc-for>\n      <sc-for list=\"{{ chartPaths }}\" as=\"cp\" hint-placeholder-count=\"1\">\n        <path d=\"{{ cp.d }}\" fill=\"none\" stroke=\"{{ cp.color }}\" stroke-width=\"{{ cp.w }}\" opacity=\"{{ cp.op }}\" style=\"transition:d .2s\"><\u002Fpath>\n      <\u002Fsc-for>\n      <g>{{ axisLabels }}<\u002Fg>\n      <text x=\"792\" y=\"234\" font-size=\"11\" font-weight=\"600\" fill=\"var(--muted)\" text-anchor=\"end\" font-family=\"IBM Plex Sans\">Years →<\u002Ftext>\n    <\u002Fsvg>\n    <div style=\"display:flex; gap:8px 20px; font-size:12px; color:var(--muted); margin-top:8px; flex-wrap:wrap\">\n      <sc-for list=\"{{ legend }}\" as=\"lg\" hint-placeholder-count=\"1\">\n        <span style=\"display:inline-flex; align-items:center; gap:6px\"><span style=\"{{ lg.dot }}\"><\u002Fspan>{{ lg.name }}<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"border-top:1px solid var(--line); padding-top:22px\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap\">\n      <div style=\"font-size:14px; font-weight:600\">Pinned scenarios <span style=\"color:var(--faint); font-weight:500\">{{ pinsCount }}<\u002Fspan><\u002Fdiv>\n      <button sc-camel-on-click=\"{{ onPin }}\" style=\"{{ pinBtnStyle }}\">Pin current scenario<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{ pinsFull }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-size:12.5px; color:var(--muted); margin-bottom:12px\">To keep comparisons clear, up to four scenarios can be pinned. Remove one to add another.<\u002Fdiv>\n    <\u002Fsc-if>\n    <div class=\"om-two-col\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px\">\n      <sc-for list=\"{{ pins }}\" as=\"pin\" hint-placeholder-count=\"0\">\n        <div sc-camel-on-click=\"{{ pin.onRestore }}\" style=\"background:var(--field); border:1px solid var(--line); border-radius:12px; padding:12px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer\" style-hover=\"border-color:var(--acc)\">\n          <div style=\"min-width:0; flex:1\">\n            <div style=\"display:flex; align-items:center; gap:8px\">\n              <span style=\"{{ pin.dot }}\"><\u002Fspan>\n              <input value=\"{{ pin.name }}\" sc-camel-on-change=\"{{ pin.onRename }}\" sc-camel-on-click=\"{{ pin.stop }}\" style=\"font:600 13.5px 'IBM Plex Sans'; color:var(--ink); background:none; border:none; outline:none; padding:2px 0; width:100%; min-width:0\" style-focus=\"border-bottom:1px solid var(--acc)\">\n            <\u002Fdiv>\n            <div style=\"font-size:12px; color:var(--muted); margin-top:2px\">{{ pin.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ pin.onRemove }}\" title=\"Remove pin\" style=\"background:none; border:none; color:var(--faint); font-size:15px; cursor:pointer; padding:4px\" style-hover=\"color:var(--ink)\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ breakeven }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--acc); background:var(--accsoft); border-radius:10px; padding:10px 16px; margin-bottom:20px\">{{ breakeven }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasPins }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"overflow-x:auto; margin:0 -4px; padding:0 4px\">\n        <sc-raw-table style=\"width:100%; border-collapse:collapse; font-size:13px; min-width:560px\">\n          <sc-raw-thead><sc-raw-tr>\n            <sc-raw-th style=\"text-align:left; font-weight:500; padding:8px 10px; border-bottom:1px solid var(--line)\"><\u002Fsc-raw-th>\n            <sc-for list=\"{{ cols }}\" as=\"col\" hint-placeholder-count=\"2\">\n              <sc-raw-th style=\"{{ col.style }}\">{{ col.name }}<\u002Fsc-raw-th>\n            <\u002Fsc-for>\n          <\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n          <sc-raw-tbody>\n            <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"7\">\n              <sc-raw-tr style=\"{{ row.style }}\">\n                <sc-raw-td style=\"text-align:left; padding:9px 10px; color:var(--muted); white-space:nowrap\">{{ row.label }}<\u002Fsc-raw-td>\n                <sc-for list=\"{{ row.cells }}\" as=\"c\" hint-placeholder-count=\"2\">\n                  <sc-raw-td style=\"{{ c.style }}\">{{ c.text }}<\u002Fsc-raw-td>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-for>\n          <\u002Fsc-raw-tbody>\n        <\u002Fsc-raw-table>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noPins }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center; font-size:13px; color:var(--faint); border:1.5px dashed var(--fline); border-radius:12px; padding:22px\">Pin a scenario to start comparing.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<div style=\"max-width:880px; margin:14px auto 0; font-size:12px; color:var(--faint); text-align:center\">Values are indicative. No currency assumed.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;system&quot;,&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;system&quot;,&quot;tsType&quot;:&quot;'system'|'light'|'dark'&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;options&quot;:[&quot;#0d7a5f&quot;,&quot;#0e7490&quot;,&quot;#4c5fa8&quot;,&quot;#a3552e&quot;],&quot;default&quot;:&quot;#0d7a5f&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;maxAmountCr&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:5,&quot;min&quot;:1,&quot;max&quot;:20,&quot;step&quot;:1,&quot;unit&quot;:&quot;Cr&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Ranges&quot;}}\">\nclass Component extends DCLogic {\n  state = this.initState();\n\n  initState() {\n    const d = { mode: 'amount', amount: 10000000, rate: 8.2, tenM: 240, emi: 86800, fees: 0, prep: 0, unit: 'yr', chart: 'balance', pins: [], copied: false };\n    try {\n      const q = new URLSearchParams(location.search);\n      const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));\n      const num = (k, lo, hi, cur) => { const v = parseFloat(q.get('lsc_' + k)); return isNaN(v) ? cur : clamp(v, lo, hi); };\n      if (['amount','emi','tenure','rate'].includes(q.get('lsc_m'))) d.mode = q.get('lsc_m');\n      d.amount = num('a', 100000, 2e8, d.amount);\n      d.rate = num('r', 4, 48, d.rate);\n      d.tenM = Math.round(num('t', 1, 720, d.tenM));\n      d.emi = num('e', 100, 1e7, d.emi);\n      d.fees = num('f', 0, 1e8, d.fees);\n      d.prep = num('pp', 0, 1e8, d.prep);\n      if (['yr','mo'].includes(q.get('lsc_u'))) d.unit = q.get('lsc_u');\n      if (q.get('lsc_p')) d.pins = JSON.parse(decodeURIComponent(q.get('lsc_p'))).slice(0, 4).filter(p => p && isFinite(p.amount) && isFinite(p.rate) && isFinite(p.tenM) && isFinite(p.emi));\n    } catch (e) {}\n    const s = this.solveFor(d.mode, d);\n    if (!s.error) { d.amount = Math.round(s.sc.amount); d.emi = Math.round(s.sc.emi); d.tenM = Math.round(s.sc.tenM); d.rate = Math.round(s.sc.rate * 100) / 100; }\n    d.baseline = d.pins.length ? { ...d.pins[d.pins.length - 1] } : (s.error ? { amount: d.amount, rate: d.rate, tenM: d.tenM, emi: d.emi, fees: d.fees } : { ...s.sc, fees: d.fees });\n    return d;\n  }\n\n  simulate(P, i, n, E, prep) {\n    n = Math.min(Math.max(1, Math.round(n)), 720);\n    let bal = P, cum = 0, paid = 0, payoff = n;\n    const pts = [{ m: 0, bal, cum: 0, paidC: 0 }];\n    for (let m = 1; m <= n; m++) {\n      const int = bal * i; cum += int;\n      const pay = Math.min(E, bal + int); bal = bal + int - pay; paid += pay;\n      if (prep > 0 && bal > 0.01 && m % 12 === 0) { const pp = Math.min(prep, bal); bal -= pp; paid += pp; }\n      pts.push({ m, bal: Math.max(0, bal), cum, paidC: paid });\n      if (bal <= 0.01) { payoff = m; bal = 0; break; }\n    }\n    return { pts, cum, paid, payoff, endBal: Math.max(0, bal) };\n  }\n\n  solveFor(mode, st) {\n    const prep = st.prep || 0;\n    let P = st.amount, rate = st.rate, n = Math.max(1, Math.round(st.tenM)), E = st.emi;\n    const i = rate / 1200;\n    let v = null, err = null;\n    // The four shared variables are always bound by the base loan equation; prepayment is display-only.\n    if (mode === 'amount') {\n      v = i > 0 ? E * (1 - Math.pow(1 + i, -n)) / i : E * n; P = v;\n    } else if (mode === 'emi') {\n      v = i > 0 ? P * i / (1 - Math.pow(1 + i, -n)) : P / n; E = v;\n    } else if (mode === 'tenure') {\n      if (E <= P * i) err = 'EMI too low to ever repay this loan';\n      else { v = i > 0 ? Math.log(E / (E - P * i)) / Math.log(1 + i) : P / E; v = Math.max(1, Math.ceil(v)); n = v; }\n    } else {\n      if (E * n <= P) err = 'EMI too low to ever repay this loan';\n      else {\n        let lo = 1e-9, hi = 0.04;\n        const f = x => P * x / (1 - Math.pow(1 + x, -n)) - E;\n        if (f(hi) < 0) v = 48;\n        else { for (let k = 0; k < 80; k++) { const mid = (lo + hi) / 2; if (f(mid) > 0) hi = mid; else lo = mid; } v = (lo + hi) / 2 * 1200; }\n        rate = v;\n      }\n    }\n    return { error: err, value: v, sc: { amount: P, rate, tenM: n, emi: E, fees: st.fees || 0, prep } };\n  }\n\n  scTotals(sc) {\n    const s = this.simulate(sc.amount, sc.rate / 1200, sc.tenM, sc.emi, sc.prep || 0);\n    return { interest: s.cum, payoff: s.payoff, allIn: sc.amount + s.cum + (sc.fees || 0), sim: s };\n  }\n\n  fmtIN(x) {\n    x = Math.round(x); const neg = x < 0 ? '-' : ''; const s = String(Math.abs(x));\n    if (s.length <= 3) return neg + s;\n    return neg + s.slice(0, -3).replace(/\\B(?=(\\d{2})+(?!\\d))/g, ',') + ',' + s.slice(-3);\n  }\n  shortAmt(x) {\n    if (x >= 1e7) return parseFloat((x / 1e7).toFixed(2)) + 'Cr';\n    if (x >= 1e5) return parseFloat((x / 1e5).toFixed(1)) + 'L';\n    return this.fmtIN(x);\n  }\n  fmtTen(m) { const y = Math.floor(m / 12), r = m % 12; return r === 0 ? y + ' yr' : (y > 0 ? y + ' yr ' + r + ' mo' : r + ' mo'); }\n\n  series(sc) {\n    const full = this.simulate(sc.amount, sc.rate / 1200, sc.tenM, sc.emi, sc.prep || 0).pts;\n    const step = Math.max(1, Math.ceil(full.length / 140));\n    return full.filter((p, idx) => idx % step === 0 || idx === full.length - 1);\n  }\n\n  // apply an update, then solve for the current mode and write the computed variable\n  // back into state, so the shared four-variable set is always self-consistent\n  commit(upd) {\n    this.setState(s => {\n      const ns = { ...s, ...upd };\n      const r = this.solveFor(ns.mode, ns);\n      if (!r.error) {\n        ns.amount = Math.round(r.sc.amount);\n        ns.emi = Math.round(r.sc.emi);\n        ns.tenM = Math.round(r.sc.tenM);\n        ns.rate = Math.round(r.sc.rate * 100) / 100;\n      }\n      return ns;\n    });\n  }\n\n  setVal(key, ev, isText) {\n    const raw = ev.target.value;\n    if (isText) this.setState(s => ({ editStr: { ...s.editStr, [key]: raw } }));\n    let v = parseFloat(raw); if (isNaN(v)) return;\n    if (key === 'tenure') this.commit({ tenM: this.state.unit === 'yr' ? Math.round(v * 12) : Math.round(v) });\n    else if (key === 'amount') this.commit({ amount: v });\n    else if (key === 'rate') this.commit({ rate: v });\n    else if (key === 'emi') this.commit({ emi: v });\n  }\n  clearEdit(key) { this.setState(s => { const e = { ...s.editStr }; delete e[key]; return { editStr: e }; }); }\n\n  pinCurrent() {\n    const st = this.state;\n    if (st.pins.length >= 4) return;\n    const s = this.solveFor(st.mode, st);\n    if (s.error) return;\n    const colors = ['#b08a3e', '#7d6b9e', '#4f7ba6', '#a06666'];\n    const used = st.pins.map(p => p.color);\n    const sc = s.sc;\n    const name = this.shortAmt(sc.amount) + '/' + parseFloat(sc.rate.toFixed(2)) + '/' + parseFloat((sc.tenM / 12).toFixed(1)) + 'Yr';\n    const pin = { ...sc, mode: st.mode, name, color: colors.find(c => !used.includes(c)) || colors[0] };\n    this.setState({ pins: [...st.pins, pin], baseline: { ...pin } });\n  }\n\n  copyLink() {\n    const st = this.state;\n    const q = new URLSearchParams();\n    q.set('lsc_m', st.mode); q.set('lsc_a', Math.round(st.amount)); q.set('lsc_r', st.rate); q.set('lsc_t', st.tenM); q.set('lsc_e', Math.round(st.emi)); q.set('lsc_f', st.fees); q.set('lsc_pp', st.prep); q.set('lsc_u', st.unit);\n    if (st.pins.length) q.set('lsc_p', encodeURIComponent(JSON.stringify(st.pins)));\n    const url = location.origin + location.pathname + '?' + q.toString();\n    const done = () => { this.setState({ copied: true }); clearTimeout(this._ct); this._ct = setTimeout(() => this.setState({ copied: false }), 1800); };\n    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done, () => window.prompt('Copy this link:', url));\n    else window.prompt('Copy this link:', url);\n  }\n\n  segStyle(active) {\n    return { padding: '7px 16px', borderRadius: '8px', fontSize: '13px', fontWeight: active ? 600 : 500, fontFamily: \"'IBM Plex Sans',sans-serif\", background: active ? 'var(--acc)' : 'none', color: active ? 'var(--onacc)' : 'var(--muted)', border: 'none', cursor: 'pointer' };\n  }\n  miniStyle(active) {\n    return { padding: '2px 8px', borderRadius: '5px', fontSize: '11px', fontWeight: 600, fontFamily: \"'IBM Plex Sans',sans-serif\", background: active ? 'var(--card)' : 'none', color: active ? 'var(--ink)' : 'var(--faint)', border: 'none', cursor: 'pointer', boxShadow: active ? '0 1px 2px rgba(0,0,0,.1)' : 'none' };\n  }\n  dot(color) { return { display: 'inline-block', width: '10px', height: '10px', borderRadius: '3px', background: color, flexShrink: 0 }; }\n\n  breakevenText(pins) {\n    if (pins.length !== 2) return false;\n    const [A, B] = pins;\n    const sA = this.scTotals(A).sim, sB = this.scTotals(B).sim;\n    // cumulative outflow (fees + all payments incl. prepayments) at month m; constant after payoff\n    const co = (s, sc, m) => (sc.fees || 0) + s.pts[Math.min(m, s.pts.length - 1)].paidC;\n    const diff0 = (A.fees || 0) - (B.fees || 0);\n    if (Math.abs(diff0) < 0.5) {\n      if (Math.abs(A.emi - B.emi) < 0.5 && Math.abs((A.prep || 0) - (B.prep || 0)) < 0.5) return 'Both scenarios have equal EMI and one-time costs.';\n      const maxM = Math.max(sA.payoff, sB.payoff);\n      const cheaper = co(sA, A, maxM) <= co(sB, B, maxM) ? A : B;\n      return '“' + cheaper.name + '” has equal one-time costs and lower total outflow — better on both counts.';\n    }\n    const H = diff0 > 0 ? A : B, L = diff0 > 0 ? B : A;\n    const sH = diff0 > 0 ? sA : sB, sL = diff0 > 0 ? sB : sA;\n    const maxM = Math.max(sA.payoff, sB.payoff);\n    let months = -1;\n    for (let m = 1; m <= maxM; m++) { if (co(sH, H, m) <= co(sL, L, m)) { months = m; break; } }\n    if (months < 0) return '“' + H.name + '” does not break even vs “' + L.name + '” within the loan tenure.';\n    return '“' + H.name + '” breaks even vs “' + L.name + '” in month ' + months + ' (year ' + Math.ceil(months / 12) + ').';\n  }\n\n  renderVals() {\n    if (typeof document !== 'undefined') {\n      const t = this.props.theme ?? 'system';\n      if (t === 'system') { document.documentElement.removeAttribute('data-theme'); document.documentElement.style.colorScheme = 'light dark'; }\n      else { document.documentElement.setAttribute('data-theme', t); document.documentElement.style.colorScheme = t; }\n      document.documentElement.style.setProperty('--accbase', this.props.accent ?? '#0d7a5f');\n    }\n    const st = this.state, self = this;\n    const maxAmt = (this.props.maxAmountCr ?? 5) * 1e7;\n    const solved = this.solveFor(st.mode, st);\n    const sc = solved.sc;\n    const modeDefs = [['amount', 'Loan Amount'], ['emi', 'EMI'], ['tenure', 'Tenure'], ['rate', 'Interest Rate']];\n    const segs = modeDefs.map(([k, label]) => ({ label, style: this.segStyle(st.mode === k), onClick: () => self.setState({ mode: k }) }));\n\n    // hero\n    const heroLabel = modeDefs.find(([k]) => k === st.mode)[1];\n    let heroValue = '', heroUnit = '';\n    if (!solved.error) {\n      if (st.mode === 'amount') heroValue = this.fmtIN(sc.amount);\n      else if (st.mode === 'emi') { heroValue = this.fmtIN(sc.emi); heroUnit = '/ mo'; }\n      else if (st.mode === 'tenure') heroValue = this.fmtTen(sc.tenM);\n      else { heroValue = sc.rate.toFixed(2); heroUnit = '% / yr'; }\n    }\n    // delta vs baseline\n    let deltaShow = false, deltaText = '';\n    if (!solved.error && st.baseline) {\n      const key = { amount: 'amount', emi: 'emi', tenure: 'tenM', rate: 'rate' }[st.mode];\n      const b = st.baseline[key], v = st.mode === 'tenure' ? sc.tenM : solved.value;\n      if (b > 0) {\n        const pct = (v - b) / b * 100;\n        deltaText = Math.abs(pct) >= 0.05 ? (pct > 0 ? '▲ +' : '▼ ') + pct.toFixed(1) + '% vs baseline' : 'Baseline';\n      }\n    }\n    const curTot = solved.error ? null : this.scTotals(sc);\n    const totInt = curTot ? curTot.interest : 0;\n    const totPaid = curTot ? curTot.allIn : 0;\n    const payoffNote = (curTot && (st.prep || 0) > 0 && curTot.payoff < Math.round(sc.tenM)) ? 'Loan closes in month ' + curTot.payoff + ' of ' + Math.round(sc.tenM) + ' with prepayments.' : false;\n\n    // editable fields\n    const fields = [];\n    if (st.mode !== 'amount') fields.push({ key: 'amount', label: 'Loan Amount', min: 100000, max: maxAmt, step: 100000, val: Math.round(st.amount), hint: true });\n    else fields.push(null);\n    if (st.mode !== 'rate') fields.push({ key: 'rate', label: 'Interest Rate (annual %)', min: 4, max: 20, step: 0.05, val: st.rate });\n    if (st.mode !== 'tenure') {\n      const yr = st.unit === 'yr';\n      fields.push({ key: 'tenure', label: 'Tenure', isTen: true, min: yr ? 1 : 12, max: yr ? 30 : 360, step: 1, val: yr ? Math.round(st.tenM / 12 * 10) / 10 : Math.round(st.tenM) });\n    }\n    if (st.mode !== 'emi') fields.push({ key: 'emi', label: 'EMI (per month)', min: 1000, max: Math.max(100000, Math.round(maxAmt * 0.012)), step: 500, val: Math.round(st.emi) });\n    const editStr = st.editStr || {};\n    const fieldItems = fields.filter(Boolean).map(f => ({\n      ...f, hint: !!f.hint, isTen: !!f.isTen,\n      textVal: editStr[f.key] ?? String(f.val),\n      onNum: ev => self.setVal(f.key, ev),\n      onText: ev => self.setVal(f.key, ev, true),\n      onFocus: ev => ev.target.select(),\n      onBlur: () => self.clearEdit(f.key),\n      setYr: () => self.setState({ unit: 'yr' }), setMo: () => self.setState({ unit: 'mo' }),\n      yrStyle: this.miniStyle(st.unit === 'yr'), moStyle: this.miniStyle(st.unit === 'mo'),\n    }));\n\n    // chart\n    const scenarios = [...st.pins.map(p => ({ sc: p, color: p.color, name: p.name, op: 0.85, w: 2 })), ...(solved.error ? [] : [{ sc, color: 'var(--acc)', name: 'Current', op: 1, w: 2.5 }])];\n    const allSeries = scenarios.map(s => ({ ...s, pts: this.series(s.sc) }));\n    const isBal = st.chart === 'balance';\n    let maxX = 1, maxY = 1;\n    allSeries.forEach(s => { s.pts.forEach(p => { maxX = Math.max(maxX, p.m); maxY = Math.max(maxY, isBal ? p.bal : p.cum); }); });\n    const X = m => 48 + (m / maxX) * 744, Y = v => 200 - (v / maxY) * 180;\n    const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => ({ y: Y(f * maxY), ty: Y(f * maxY) + 3.5, op: f === 0 ? 1 : 0.5, label: f === 0 ? '0' : this.shortAmt(f * maxY) }));\n    const yrsTot = maxX / 12;\n    const stepYr = [1, 2, 3, 5, 10, 15].find(s => yrsTot / s <= 7) || 15;\n    const xTicks = [];\n    for (let y2 = stepYr; y2 * 12 <= maxX + 6; y2 += stepYr) xTicks.push({ x: X(Math.min(y2 * 12, maxX)), label: String(y2) });\n    const chartPaths = allSeries.map(s => ({\n      color: s.color, op: s.op, w: s.w,\n      d: s.pts.map((p, idx) => (idx ? 'L' : 'M') + X(p.m).toFixed(1) + ',' + Y(isBal ? p.bal : p.cum).toFixed(1)).join(' '),\n    }));\n    const legend = allSeries.map(s => ({ name: s.name, dot: this.dot(s.color) }));\n\n    // pins\n    const pins = st.pins.map((p, idx) => ({\n      name: p.name, color: p.color, dot: { ...this.dot(p.color), width: '9px', height: '9px', borderRadius: '50%' },\n      sub: parseFloat(p.rate.toFixed(2)) + '% · ' + this.fmtTen(p.tenM) + ' · EMI ' + this.fmtIN(p.emi),\n      onRestore: () => self.setState({ amount: p.amount, rate: p.rate, tenM: p.tenM, emi: p.emi, fees: p.fees || 0, prep: p.prep || 0, feesStr: undefined, prepStr: undefined, mode: p.mode || st.mode }),\n      onRemove: ev => { ev.stopPropagation(); const np = st.pins.filter((_, j) => j !== idx); self.setState({ pins: np, baseline: np.length ? { ...np[np.length - 1] } : st.baseline }); },\n      onRename: ev => { const np = st.pins.slice(); np[idx] = { ...np[idx], name: ev.target.value }; self.setState({ pins: np }); },\n      stop: ev => ev.stopPropagation(),\n    }));\n\n    // table\n    const colScs = [...st.pins, ...(solved.error ? [] : [{ ...sc, fees: st.fees || 0, prep: st.prep || 0, name: 'Current', color: 'var(--acc)' }])];\n    const cols = colScs.map(c => ({ name: c.name, style: { textAlign: 'right', fontWeight: 600, padding: '8px 10px', borderBottom: '2px solid ' + c.color, color: 'var(--ink)', whiteSpace: 'nowrap', fontFamily: \"'IBM Plex Sans',sans-serif\" } }));\n    const colTots = colScs.map(c => this.scTotals(c));\n    const rowDefs = [\n      ['Loan amount', c => c.amount, v => this.fmtIN(v), 'high'],\n      ['Interest rate', c => c.rate, v => v.toFixed(2) + '%', 'low'],\n      ['Tenure (effective)', (c, t) => t.payoff, v => this.fmtTen(v), 'low'],\n      ['EMI', c => c.emi, v => this.fmtIN(v), 'low'],\n      ['Yearly prepayment', c => c.prep || 0, v => this.fmtIN(v), null],\n      ['One-time costs', c => c.fees || 0, v => this.fmtIN(v), 'low'],\n      ['Total interest', (c, t) => t.interest, v => this.fmtIN(v), 'low'],\n      ['Total cost (interest + fees)', (c, t) => t.interest + (c.fees || 0), v => this.fmtIN(v), 'low'],\n      ['Total paid (all-in)', (c, t) => t.allIn, v => this.fmtIN(v), 'low'],\n      ['Interest / principal', (c, t) => t.interest / c.amount * 100, v => Math.round(v) + '%', 'low'],\n    ];\n    const rows = rowDefs.map(([label, get, fmt, dir], ri) => {\n      const vals = colScs.map((c, ci) => get(c, colTots[ci]));\n      const best = colScs.length > 1 && dir ? (dir === 'low' ? Math.min(...vals) : Math.max(...vals)) : null;\n      return {\n        label,\n        style: { background: ri % 2 === 1 ? 'var(--zebra)' : 'none' },\n        cells: vals.map(v => ({\n          text: fmt(v),\n          style: { textAlign: 'right', padding: '9px 10px', whiteSpace: 'nowrap', fontVariantNumeric: 'tabular-nums', ...(best !== null && Math.abs(v - best) < 0.5 ? { background: 'var(--best)', fontWeight: 600 } : {}) },\n        })),\n      };\n    });\n\n    return {\n      segs, heroLabel, heroError: solved.error || false, heroOk: !solved.error, heroValue, heroUnit,\n      deltaText: deltaText || 'Baseline', onSetBaseline: () => { if (!solved.error) self.setState({ baseline: { ...sc, fees: st.fees || 0 } }); }, totInterest: this.fmtIN(totInt), totPaid: this.fmtIN(totPaid),\n      fields: fieldItems, feesVal: st.feesStr ?? String(st.fees), onFees: ev => { const raw = ev.target.value; const v = parseFloat(raw); self.setState({ feesStr: raw, fees: isNaN(v) ? 0 : Math.max(0, v) }); },\n      prepVal: st.prepStr ?? String(st.prep), onPrep: ev => { const raw = ev.target.value; const v = parseFloat(raw); self.setState({ prepStr: raw, prep: isNaN(v) ? 0 : Math.max(0, v) }); },\n      payoffNote, onSel
